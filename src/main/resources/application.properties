# =============================================
#  FERROMAX ERP — Configuración principal
# =============================================

# ----- Servidor -----
server.port=8081
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain

# ----- Aplicación -----
spring.application.name=ferromax-erp

# ----- Base de datos PostgreSQL -----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ferromax_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=FerromaxHikariPool

# ----- JPA / Hibernate -----
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ----- Jackson (fechas en ISO 8601, zona horaria argentina) -----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Argentina/Buenos_Aires
spring.jackson.locale=es_AR
spring.jackson.default-property-inclusion=non_null

# ----- Zona horaria JVM -----
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires

# ----- JWT -----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:28800000}

# ----- WebSocket / STOMP -----
app.websocket.endpoint=/ws
app.websocket.topic-prefix=/topic
app.websocket.app-prefix=/app
app.websocket.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173,http://localhost:5174,http://localhost:5175

# ----- SpringDoc / Swagger UI -----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.show-actuator=false

# ----- Actuator -----
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=Ferromax ERP
info.app.version=1.0.0
info.app.description=Sistema de gestión integral para ferretería argentina

# ----- Cache (Caffeine) -----
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# ----- OCR.space API (OCR de imágenes) -----
# key gratuita: registrarse en ocr.space/ocrapi para 25k req/mes
ocr.space.api.key=${OCR_SPACE_API_KEY:helloworld}

# ----- Multipart (subida de facturas) -----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ----- Logging -----
logging.level.root=INFO
logging.level.com.ferromax=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ----- Google Gemini -----
gemini.api.key=${GEMINI_API_KEY}

# ----- Webhook de pasarela de pagos -----
# El secret se obtiene del dashboard de MercadoPago/Stripe al crear el webhook
webhook.secret=${WEBHOOK_SECRET:secret-de-prueba-local}
